defaults:
  - _self_
  - dataset_unsupervised/parquet
  - inference: with_client_id_memory_iterable
  - inference/seq_encoder/pretrained
  - trx_embedding_layers: all_features


graph_path: data/graphs/weighted

device: cuda

seed_everything: 42
logger_name: mles_model
model_path: models/mles_model.p
embed_file_name: mles_embeddings

data_module:
  _target_: ptls.frames.PtlsDataModule
  train_data:
    _target_: ptls_extension_2024_research.ColesDataset
    splitter:
      _target_: ptls.frames.coles.split_strategy.SampleSlices
      split_count: 5
      cnt_min: 25
      cnt_max: 200
    data: ${dataset_unsupervised.train}
    col_client_id: 'encoded_client_id'
  valid_data:
    _target_: ptls_extension_2024_research.ColesDataset
    splitter:
      _target_: ptls.frames.coles.split_strategy.SampleSlices
      split_count: 5
      cnt_min: 25
      cnt_max: 100
    data: ${dataset_unsupervised.valid}
    col_client_id: 'encoded_client_id'
  train_batch_size: 64
  train_num_workers: 16
  valid_batch_size: 512
  valid_num_workers: 16

trainer: 
  accelerator: ${device}
  max_epochs: 150
  enable_checkpointing: false
  deterministic: true

pl_module:
  _target_: ptls_extension_2024_research.frames.coles_client_id_aware.coles_module__trx_with_ci_embs.CoLESModule_CITrx
  validation_metric:
    _target_: ptls.frames.coles.metric.BatchRecallTopK
    K: 4
    metric: cosine
  seq_encoder:
    _target_: ptls.nn.RnnSeqEncoder
    trx_encoder:
      _target_: ptls_extension_2024_research.TrxEncoder_WithCIEmbeddings
      norm_embeddings: false
      embeddings_noise: 0.003
      embeddings: ${trx_embedding_layers}
      numeric_values: 
        amount_rur: identity
      col_item_ids: mcc_code
    type: gru
    hidden_size: 800
    bidir: false
    trainable_starter: static
  head:
    _target_: ptls.nn.Head
    use_norm_encoder: true
  loss:
    _target_: ptls.frames.coles.losses.ContrastiveLoss
    margin: 0.5
    sampling_strategy:
      _target_: ptls.frames.coles.sampling_strategies.HardNegativePairSelector
      neg_count: 5
  optimizer_partial:
    _partial_: true
    _target_: torch.optim.Adam
    lr: 0.001
    weight_decay: 0.0
  lr_scheduler_partial:
    _partial_: true
    _target_: torch.optim.lr_scheduler.StepLR
    step_size: 30
    gamma: 0.9025
