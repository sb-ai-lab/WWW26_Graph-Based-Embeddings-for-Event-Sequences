enabled: true
model:
  _target_: lightgbm.LGBMClassifier
  n_estimators: 1000
  boosting_type: gbdt
  objective: multiclass
  num_class: 6
  metric: multi_error
  learning_rate: 0.02
  subsample: 0.75
  subsample_freq: 1
  feature_fraction: 0.75
  colsample_bytree: null
  max_depth: 12
  lambda_l1: 1
  reg_alpha: null
  lambda_l2: 1
  reg_lambda: null
  min_data_in_leaf: 50
  min_child_samples: null
  num_leaves: 50
  random_state: 42
  n_jobs: 4
cpu_count: 4
preprocessing: 
  - _target_: sklearn.preprocessing.MaxAbsScaler
