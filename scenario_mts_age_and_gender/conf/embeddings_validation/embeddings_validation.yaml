defaults:
  - _self_
  - models/lgbm: age 

# conf_path: conf/embeddings_validation_baselines_unsupervised.yaml
target_name: age
report_file_name: mts_${target_name}_embedding_validation.txt
environment: 
  work_dir: embeddings_validation_${target_name}.work
target: 
  file_name: ${hydra:runtime.cwd}/data/train_${target_name}.csv
  cols_id: 
    - user_id
  cols_id_type: 
    - int
  col_target: ${target_name}
split: 
  fit_ids: true
  train_id: 
    file_name: ${hydra:runtime.cwd}/data/train_${target_name}.csv
  test_id: 
    file_name: ${hydra:runtime.cwd}/data/test_ids_file.csv
  cv_split_count: 5
  is_stratify: true
  random_state: 42
