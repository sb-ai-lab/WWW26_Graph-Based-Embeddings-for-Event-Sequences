metrics: 
  accuracy: 
    enabled: true
    score_func: sklearn.metrics.accuracy_score
    scorer_params: 
      needs_proba: false
report_file: ${hydra:runtime.cwd}/results/${report_file_name}
features:   
  coles_batch_size_40_split_count_2_freeze_url_false_epoches_150:
    enabled: true
    read_params: 
      file_name: ${hydra:runtime.cwd}/data/coles_batch_size_40_split_count_2_freeze_url_false_epoches_150_embeddings.pickle
    target_options: {}
    


external_scores: {}
report: 
  is_check_train: false
  error_handling: fail
  print_all_metrics: false
  metrics: 
    accuracy: 
      float_format: "{:.3f}"
      baseline_key: 
        - lgbm
        # - coles
      split_columns: true
